<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FestiFlip – Access Denied</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a1a;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 30% 50%, rgba(239, 68, 68, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 30%, rgba(255, 100, 50, 0.08) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .denied-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .denied-card {
            background: rgba(20, 20, 40, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 24px;
            padding: 48px 40px;
            text-align: center;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(239, 68, 68, 0.05);
            animation: cardSlide 0.5s ease-out;
        }

        @keyframes cardSlide {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .shield-icon {
            font-size: 64px;
            margin-bottom: 16px;
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #fca5a5;
            margin-bottom: 16px;
        }

        .denied-message {
            color: rgba(255, 255, 255, 0.5);
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 8px;
        }

        .email-badge {
            display: inline-block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 14px;
            color: #fca5a5;
            font-weight: 500;
            margin: 16px 0 28px 0;
            font-family: monospace;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <div class="denied-container">
        <div class="denied-card">
            <div class="shield-icon">🛡️</div>
            <h1>Access Denied</h1>
            <p class="denied-message">
                This account is not authorized to access the FestiFlip admin dashboard.
            </p>
            <div class="email-badge">{{ email }}</div>
            <p class="denied-message">
                Contact the administrator if you believe this is a mistake.
            </p>
            <a href="/auth/login" class="back-btn">
                ← Try a different account
            </a>
        </div>
    </div>
</body>

</html>
